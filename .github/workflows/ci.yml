name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm lint
      - run: pnpm test
      - name: XSS check
        run: |
          count=$(grep -r "dangerouslySetInnerHTML" src/ | grep -v "layout.tsx" | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "Found dangerouslySetInnerHTML outside layout.tsx:"
            grep -r "dangerouslySetInnerHTML" src/ | grep -v "layout.tsx"
            exit 1
          fi
